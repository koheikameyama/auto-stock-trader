name: Personal Recommendations

on:
  workflow_dispatch:
    inputs:
      session:
        description: 'Session (morning/afternoon/evening)'
        required: true
        default: 'evening'
        type: choice
        options:
          - morning
          - afternoon
          - evening
  workflow_call:
    inputs:
      session:
        description: 'Session (morning/afternoon/evening)'
        type: string
        default: 'evening'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install "yfinance>=1.2.0" psycopg2-binary openai numpy requests

      - name: Generate user recommendations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SESSION: ${{ inputs.session }}
        run: python scripts/github-actions/generate_personal_recommendations.py
