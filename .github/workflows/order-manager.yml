name: Order Manager

on:
  workflow_dispatch:
    inputs:
      skip_checks:
        description: "市場日・システム停止チェックをスキップ"
        type: boolean
        default: false

env:
  APP_URL: ${{ secrets.APP_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      response: ${{ steps.api.outputs.response }}
    steps:
      - name: Trigger order-manager
        id: api
        run: |
          QUERY=""
          if [ "${{ github.event.inputs.skip_checks }}" = "true" ]; then
            QUERY="?skip_checks=true"
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/order-manager${QUERY}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          echo "response=$BODY" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Job failed with HTTP $HTTP_CODE"
            exit 1
          fi

  notify-success:
    needs: trigger
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on success
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "✅ order-manager 完了"
          SLACK_MESSAGE: "order-manager が正常に完了しました"
          SLACK_COLOR: good
          SLACK_FOOTER: "Stock Buddy"

  notify-failure:
    needs: trigger
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "❌ order-manager 失敗"
          SLACK_MESSAGE: |
            order-manager が失敗しました
            レスポンス: ${{ needs.trigger.outputs.response }}
          SLACK_COLOR: danger
          SLACK_FOOTER: "Stock Buddy"
