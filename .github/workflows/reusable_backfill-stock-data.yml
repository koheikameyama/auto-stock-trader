name: "[Reusable] Backfill Stock Data"

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      DATABASE_URL:
        required: true
      SLACK_WEBHOOK_URL:
        required: true
      YFINANCE_PROXY:
        required: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  YFINANCE_PROXY: ${{ secrets.YFINANCE_PROXY }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Start yfinance sidecar
        uses: ./.github/actions/start-yfinance
      - run: npm run backfill:stock-data

  notify-success:
    needs: run
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on success
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Backfill Stock Data 完了"
          SLACK_MESSAGE: "株価・OHLCV日足・ファンダメンタルデータのバックフィルが完了しました"
          SLACK_COLOR: good
          SLACK_FOOTER: "Auto Stock Trader"

  notify-failure:
    needs: run
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Backfill Stock Data 失敗"
          SLACK_MESSAGE: |
            株価バックフィルが失敗しました。
            詳細はGitHub Actionsログを確認してください。
          SLACK_COLOR: danger
          SLACK_FOOTER: "Auto Stock Trader"
