name: "[Scheduled] Weekly Review"

on:
  schedule:
    # 土曜 10:00 JST = 土曜 01:00 UTC
    - cron: "0 1 * * 6"
  workflow_dispatch:

concurrency:
  group: weekly-review
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  YFINANCE_PROXY: ${{ secrets.YFINANCE_PROXY }}

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Start yfinance sidecar
        uses: ./.github/actions/start-yfinance
      - run: npm run weekly

  notify-failure:
    needs: weekly-review
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Weekly Review 失敗"
          SLACK_MESSAGE: |
            週次レビューが失敗しました。
            詳細はGitHub Actionsログを確認してください。
          SLACK_COLOR: danger
          SLACK_FOOTER: "Stock Buddy"
