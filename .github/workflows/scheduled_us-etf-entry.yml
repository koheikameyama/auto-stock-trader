name: "[Scheduled] US ETF Entry Executor"

on:
  # スケジュール実行は cron-job.org から workflow_dispatch 経由でトリガーする
  # (時間精度が GitHub Actions schedule では不十分なため、.claude/rules/github-actions.md 参照)
  workflow_dispatch:
    inputs:
      skip_market_day_check:
        description: "休場日チェックをスキップ"
        type: boolean
        default: false

concurrency:
  group: us-etf-entry
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  TACHIBANA_USER_ID: ${{ secrets.TACHIBANA_USER_ID }}
  TACHIBANA_PASSWORD: ${{ secrets.TACHIBANA_PASSWORD }}
  TACHIBANA_SECOND_PASSWORD: ${{ secrets.TACHIBANA_SECOND_PASSWORD }}
  TACHIBANA_ENV: ${{ secrets.TACHIBANA_ENV }}
  ETF_TRADING_BUDGET: ${{ secrets.ETF_TRADING_BUDGET }}

jobs:
  check-market-day:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.result.outputs.should_run }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Check market day
        id: check
        run: |
          RESULT=$(npx tsx scripts/check-market-day.ts)
          echo "should_run=$RESULT" >> "$GITHUB_OUTPUT"
      - name: Determine final
        id: result
        run: |
          SKIP="${{ github.event.inputs.skip_market_day_check }}"
          CHECK="${{ steps.check.outputs.should_run }}"
          if [ "$SKIP" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=$CHECK" >> "$GITHUB_OUTPUT"
          fi

  entry:
    needs: check-market-day
    if: needs.check-market-day.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run us-etf-entry

  notify-failure:
    needs: [check-market-day, entry]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "❌ US ETF Entry Executor 失敗"
          SLACK_MESSAGE: "詳細は GitHub Actions ログを確認してください"
          SLACK_COLOR: danger
          SLACK_FOOTER: "Auto Stock Trader"
