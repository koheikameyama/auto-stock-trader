name: "[Scheduled] Backfill Prices"

on:
  schedule:
    # 平日 17:00 JST = 08:00 UTC (月-金)
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

concurrency:
  group: backfill-prices
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run backfill

  notify-success:
    needs: backfill
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on success
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Backfill Prices 完了"
          SLACK_MESSAGE: "株価・OHLCV日足・ファンダメンタルデータのバックフィルが完了しました"
          SLACK_COLOR: good
          SLACK_FOOTER: "Stock Buddy"

  notify-failure:
    needs: backfill
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Backfill Prices 失敗"
          SLACK_MESSAGE: |
            株価バックフィルが失敗しました。
            詳細はGitHub Actionsログを確認してください。
          SLACK_COLOR: danger
          SLACK_FOOTER: "Stock Buddy"
