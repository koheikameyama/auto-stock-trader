name: "[Scheduled] Backfill Prices"

on:
  schedule:
    # 平日 17:00 JST = 08:00 UTC (月-金)
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
    inputs:
      skip_market_day_check:
        description: "休場日チェックをスキップ"
        type: boolean
        default: false
      job:
        description: "実行するジョブ（空欄=全て）"
        type: choice
        options:
          - all
          - stock-data
          - corporate-events
          - trading-config

concurrency:
  group: backfill-prices
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  check-market-day:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.result.outputs.should_run }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate

      - name: Check market day and system active
        id: check
        run: |
          RESULT=$(npx tsx scripts/check-market-day.ts)
          echo "should_run=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Determine final result
        id: result
        run: |
          SKIP="${{ github.event.inputs.skip_market_day_check }}"
          CHECK="${{ steps.check.outputs.should_run }}"
          if [ "$SKIP" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=$CHECK" >> "$GITHUB_OUTPUT"
          fi

  # stock-data / corporate-events / trading-config を並列実行
  stock-data:
    needs: check-market-day
    if: needs.check-market-day.outputs.should_run == 'true' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'stock-data' || github.event.inputs.job == '')
    uses: ./.github/workflows/reusable_backfill-stock-data.yml
    secrets:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      YFINANCE_PROXY: ${{ secrets.YFINANCE_PROXY }}

  corporate-events:
    needs: check-market-day
    if: needs.check-market-day.outputs.should_run == 'true' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'corporate-events' || github.event.inputs.job == '')
    uses: ./.github/workflows/reusable_backfill-corporate-events.yml
    secrets:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      YFINANCE_PROXY: ${{ secrets.YFINANCE_PROXY }}

  trading-config:
    needs: check-market-day
    if: needs.check-market-day.outputs.should_run == 'true' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'trading-config' || github.event.inputs.job == '')
    uses: ./.github/workflows/reusable_backfill-trading-config.yml
    secrets:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      YFINANCE_PROXY: ${{ secrets.YFINANCE_PROXY }}

  breadth-notify:
    needs: stock-data
    if: needs.stock-data.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run breadth-notify
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-success:
    needs: [stock-data, corporate-events, trading-config]
    if: always() && !contains(needs.*.result, 'failure') && contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on success
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Backfill Prices 全処理完了"
          SLACK_MESSAGE: "株価データ・コーポレートイベント・TradingConfigの全バックフィルが完了しました"
          SLACK_COLOR: good
          SLACK_FOOTER: "Auto Stock Trader"

  notify-failure:
    needs: [check-market-day, stock-data, corporate-events, trading-config]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Backfill Prices 一部失敗"
          SLACK_MESSAGE: |
            バックフィル処理の一部が失敗しました。
            詳細はGitHub Actionsログを確認してください。
          SLACK_COLOR: danger
          SLACK_FOOTER: "Auto Stock Trader"
