name: "[Manual] Backfill Daily Bars 6y"

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install yfinance pandas psycopg2-binary
      - run: python scripts/_backfill-daily-bars-6y.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
