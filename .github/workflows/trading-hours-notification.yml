name: Trading Hours Notification

on:
  # cron-job.org から workflow_dispatch で正確な時刻にトリガー
  workflow_dispatch:
    inputs:
      notification_type:
        description: '通知タイプ'
        required: true
        default: 'open'
        type: choice
        options:
          - open
          - close
      notify:
        description: 'Push通知を送信する'
        required: false
        type: boolean
        default: true

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Determine notification type
        id: notification
        run: |
          HOUR=$(TZ=Asia/Tokyo date +%H)
          if [ "${{ github.event.inputs.notification_type }}" = "close" ]; then
            echo "type=close" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.notification_type }}" = "open" ]; then
            echo "type=open" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -lt 12 ]; then
            echo "type=open" >> $GITHUB_OUTPUT
          else
            echo "type=close" >> $GITHUB_OUTPUT
          fi

      - name: Send market open notification
        if: steps.notification.outputs.type == 'open' && (github.event_name != 'workflow_dispatch' || inputs.notify)
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          python scripts/github-actions/send_push_notification.py \
            --title "東京証券取引所が開場しました" \
            --body "本日の取引が始まりました。ポートフォリオをチェックしましょう。" \
            --url "/dashboard"

      - name: Send market close notification
        if: steps.notification.outputs.type == 'close' && (github.event_name != 'workflow_dispatch' || inputs.notify)
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          python scripts/github-actions/send_push_notification.py \
            --title "本日の取引が終了しました" \
            --body "お疲れ様でした。本日のポートフォリオを確認しましょう。" \
            --url "/dashboard"
