name: "[CI] Test & Lint"

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "scripts/**"
      - "prisma/**"
      - "package*.json"
      - ".github/workflows/ci_test.yml"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  YFINANCE_PROXY: ${{ secrets.YFINANCE_PROXY }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - name: Start yfinance sidecar
        uses: ./.github/actions/start-yfinance
      - run: npm test

  notify-failure:
    needs: [lint-and-test]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "‚ĚĆ CIŚ§Īśēó"
          SLACK_MESSAGE: |
            Lint „Āĺ„Āü„ĀĮ„ÉÜ„āĻ„Éą„ĀĆŚ§Īśēó„Āó„Āĺ„Āó„Āü„Äā
            Ť©≥Áīį„ĀĮGitHub Actions„É≠„āį„āíÁĘļŤ™ć„Āó„Ā¶„ĀŹ„Ā†„Āē„ĀĄ„Äā
          SLACK_COLOR: danger
          SLACK_FOOTER: "Stock Buddy"
