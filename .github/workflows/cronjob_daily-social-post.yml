name: "[cron-job.org] Daily Social Post"

on:
  # 平日 17:30 JST に cron-job.org から workflow_dispatch でトリガーする。
  # end-of-day（17:00 JST）で当日の StockDailyBar / VIX が確定した後に日次ログを
  # Bluesky / Threads へ公開投稿する（breadth/VIX を当日値で出すため）。
  # 旧 GitHub Actions cron（30 8 * * 1-5）は :30 でのドリフト・稀なスキップで当日投稿が
  # 欠損し得るため、morning-social-post（KOH-521）と同じ cron-job.org 起動へ移行。
  workflow_dispatch:
    inputs:
      skip_market_day_check:
        description: "休場日チェックをスキップ"
        type: boolean
        default: false

concurrency:
  group: daily-social-post
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  SNS_POST_SLACK_WEBHOOK_URL: ${{ secrets.SNS_POST_SLACK_WEBHOOK_URL }}
  BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
  BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
  THREADS_USER_TOKEN: ${{ secrets.THREADS_USER_TOKEN }}

jobs:
  check-market-day:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.result.outputs.should_run }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate

      - name: Check market day and system active
        id: check
        run: |
          RESULT=$(npx tsx scripts/check-market-day.ts)
          echo "should_run=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Determine final result
        id: result
        run: |
          SKIP="${{ github.event.inputs.skip_market_day_check }}"
          CHECK="${{ steps.check.outputs.should_run }}"
          if [ "$SKIP" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=$CHECK" >> "$GITHUB_OUTPUT"
          fi

  social-post:
    needs: check-market-day
    if: needs.check-market-day.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Post daily log to Bluesky
        run: npm run social:post

  notify-failure:
    needs: [check-market-day, social-post]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "❌ daily-social-post 失敗"
          SLACK_MESSAGE: |
            daily-social-post（Bluesky日次投稿）が失敗しました。
            詳細はGitHub Actionsログを確認してください。
          SLACK_COLOR: danger
          SLACK_FOOTER: "Auto Stock Trader"
