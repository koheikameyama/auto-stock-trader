name: "[Scheduled] Monthly Strategy Health Check"

on:
  schedule:
    # 毎月第1土曜 11:00 JST = 02:00 UTC（1-7日の土曜）
    - cron: "0 2 1-7 * 6"
  workflow_dispatch:

concurrency:
  group: monthly-strategy-health
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  walk-forward:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Run walk-forward analysis (active strategies gapup / psc)
        run: python scripts/run_monthly_walk_forward.py
      - name: Upload WF results for baseline captain review
        if: always()  # 一部失敗でも書き出せた分は統合レビューに渡す
        uses: actions/upload-artifact@v4
        with:
          name: wf-results
          path: wf-results.json
          if-no-files-found: warn
          retention-days: 7

  # 旧 combined-compare (strategy-mix 比較) は KOH-516 で撤去。
  # 大型株戦略の復活比較は KOH-511/512 で決着済み (substitute)。再評価は ¥10M+ 移行時に手動。
  baseline-health:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: walk-forward
    if: always()  # WFが失敗しても baseline ヘルスは実行する (独立した判断材料)
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Download WF results (for unified captain review)
        continue-on-error: true  # WF失敗時は artifact 無し → baseline 単独でレビュー
        uses: actions/download-artifact@v4
        with:
          name: wf-results
      - name: Run baseline health check (GU3+PSC2, 直近24ヶ月ローリング)
        run: python scripts/run_monthly_baseline_health.py

  us-etf-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # WF/combined-compare とは独立 (実トレード集計のみで BT 不要)
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: ETF strategy health (劣化検知)
        run: npm run us-etf-health

  notify-failure:
    needs: [walk-forward, baseline-health, us-etf-health]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "❌ Monthly Strategy Health Check 失敗"
          SLACK_MESSAGE: |
            戦略ヘルスチェック (WF + baselineヘルス) が失敗しました。
            詳細はGitHub Actionsログを確認してください。
          SLACK_COLOR: danger
          SLACK_FOOTER: "Auto Stock Trader"
