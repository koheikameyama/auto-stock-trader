name: "[Manual] Emergency Delete Old Bars"

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install psycopg2-binary
      - run: python scripts/_emergency-delete-old-bars.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
