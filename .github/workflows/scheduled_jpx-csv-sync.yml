name: "[Scheduled] JPX CSV Sync"

on:
  schedule:
    # 月曜 6:00 JST = 日曜 21:00 UTC
    - cron: "0 21 * * 0"
  workflow_dispatch:

concurrency:
  group: jpx-csv-sync
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  jpx-csv-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: pip install xlrd==2.0.2 requests
      - run: npm ci
      - run: npx prisma generate
      - name: Download JPX CSV
        run: python scripts/download_jpx_csv.py
      - name: Sync JPX CSV to Stock master
        run: npm run jpx-sync

  notify-success:
    needs: jpx-csv-sync
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on success
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "✅ jpx-csv-sync 完了"
          SLACK_MESSAGE: "JPX 上場銘柄マスタの週次同期が正常に完了しました"
          SLACK_COLOR: good
          SLACK_FOOTER: "Auto Stock Trader"

  notify-failure:
    needs: jpx-csv-sync
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "❌ jpx-csv-sync 失敗"
          SLACK_MESSAGE: |
            JPX 上場銘柄マスタの週次同期が失敗しました
            詳細はGitHub Actionsログを確認してください
          SLACK_COLOR: danger
          SLACK_FOOTER: "Auto Stock Trader"
