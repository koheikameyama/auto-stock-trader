name: "[Manual] DB Coverage Check + yfinance pilot"

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npx prisma generate
      - run: pip install yfinance pandas psycopg2-binary
      - run: npx tsx scripts/_db-coverage.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: python scripts/_pilot-yfinance-6y.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
