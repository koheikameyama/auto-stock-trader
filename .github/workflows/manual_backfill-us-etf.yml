name: "[Manual] Backfill US ETF to Prod"

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install yfinance pandas psycopg2-binary
      - run: python scripts/backfill-us-etf-bars.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
