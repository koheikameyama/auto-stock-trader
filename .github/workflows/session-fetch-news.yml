name: Fetch Market News

on:
  workflow_dispatch:
    inputs:
      market:
        description: 'Which market to fetch'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - jp
          - us
  workflow_call:
    inputs:
      market:
        description: 'Which market to fetch (both/jp/us)'
        type: string
        default: 'both'

jobs:
  fetch-jp-news:
    if: inputs.market == 'both' || inputs.market == 'jp'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch JP market news
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx scripts/news/fetch-news.ts

  fetch-us-news:
    if: inputs.market == 'both' || inputs.market == 'us'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch US market news
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx scripts/news/fetch-us-news.ts
