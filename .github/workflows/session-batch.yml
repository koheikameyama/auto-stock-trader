name: Session Batch

on:
  workflow_dispatch:
    inputs:
      session:
        description: 'セッション (morning/mid-morning/afternoon/mid-afternoon/close)'
        required: true
        default: 'close'
        type: choice
        options:
          - morning
          - mid-morning
          - afternoon
          - mid-afternoon
          - close
      notify:
        description: 'Push通知を送信する'
        required: false
        type: boolean
        default: true

# ──────────────────────────────────────────────
# 実行フロー:
#   fetch-news + fetch-stock-prices（並列）
#     → calculate-sector-trends
#       → 分析ジョブ群（並列）
#         → notify
# ──────────────────────────────────────────────

jobs:
  # ── Phase 1: データ取得（並列） ──

  fetch-news:
    if: inputs.session == 'morning' || inputs.session == 'afternoon'
    uses: ./.github/workflows/session-fetch-news.yml
    with:
      market: ${{ inputs.session == 'morning' && 'both' || 'jp' }}
    secrets: inherit

  fetch-stock-prices:
    if: inputs.session == 'morning' || inputs.session == 'afternoon' || inputs.session == 'close'
    uses: ./.github/workflows/session-fetch-stock-prices.yml
    secrets: inherit

  # ── Phase 2: セクタートレンド計算 ──

  calculate-sector-trends:
    needs: [fetch-news, fetch-stock-prices]
    if: "!failure() && !cancelled() && (inputs.session == 'morning' || inputs.session == 'afternoon' || inputs.session == 'close')"
    uses: ./.github/workflows/session-calculate-sector-trends.yml
    secrets: inherit

  # ── Phase 3: 分析ジョブ群（並列） ──

  purchase-recommendations:
    needs: calculate-sector-trends
    uses: ./.github/workflows/session-purchase-recommendations.yml
    secrets: inherit

  portfolio-analysis:
    needs: calculate-sector-trends
    uses: ./.github/workflows/session-portfolio-analysis.yml
    secrets: inherit

  personal-recommendations:
    needs: calculate-sector-trends
    uses: ./.github/workflows/session-personal-recommendations.yml
    with:
      session: ${{ inputs.session == 'morning' && 'morning' || inputs.session == 'close' && 'evening' || 'afternoon' }}
    secrets: inherit

  gainers-losers:
    if: inputs.session == 'close'
    needs: calculate-sector-trends
    uses: ./.github/workflows/session-gainers-losers.yml
    secrets: inherit

  portfolio-snapshots:
    if: inputs.session == 'close'
    needs: calculate-sector-trends
    uses: ./.github/workflows/session-portfolio-snapshots.yml
    secrets: inherit

  # ── Phase 4: 通知 ──

  notify:
    needs: [purchase-recommendations, portfolio-analysis, personal-recommendations, gainers-losers, portfolio-snapshots]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests

      - name: Send push notification
        if: (needs.purchase-recommendations.result == 'success' || needs.portfolio-analysis.result == 'success') && (github.event_name != 'workflow_dispatch' || inputs.notify)
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          python scripts/github-actions/send_push_notification.py \
            --title "今日の株価分析が完了しました" \
            --body "ポートフォリオ分析と購入レコメンドを更新しました" \
            --url "/my-stocks"

      - name: Notify Slack on success
        if: needs.purchase-recommendations.result == 'success' && needs.portfolio-analysis.result == 'success'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "✅ 株価分析の生成に成功しました (${{ inputs.session }})"
          SLACK_MESSAGE: "株価分析・ポートフォリオ分析・購入レコメンドを更新しました"
          SLACK_COLOR: good
          SLACK_FOOTER: "Stock Buddy"

      - name: Notify Slack on failure
        if: contains(needs.*.result, 'failure')
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "❌ 株価分析の生成に失敗しました (${{ inputs.session }})"
          SLACK_MESSAGE: "詳細はGitHub Actionsログを確認してください"
          SLACK_COLOR: danger
          SLACK_FOOTER: "Stock Buddy"
