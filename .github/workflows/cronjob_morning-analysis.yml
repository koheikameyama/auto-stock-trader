name: "[cron-job.org] Morning Analysis"

on:
  # schedule:
  #   # 8:00 JST = 23:00 UTC (前日)
  #   # UTC日-木 = JST月-金
  #   - cron: "0 23 * * 0-4"
  workflow_dispatch:
    inputs:
      job:
        description: "実行するジョブ"
        type: choice
        required: true
        default: all
        options:
          - all
          - news
          - assess
          - holding
          - scan
      skip_market_day_check:
        description: "休場日チェックをスキップ"
        type: boolean
        default: false

concurrency:
  group: morning-analysis
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
  LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
  LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  MARKET_DATA_PROVIDER: ${{ secrets.MARKET_DATA_PROVIDER }}
  TACHIBANA_USER_ID: ${{ secrets.TACHIBANA_USER_ID }}
  TACHIBANA_PASSWORD: ${{ secrets.TACHIBANA_PASSWORD }}
  TACHIBANA_SECOND_PASSWORD: ${{ secrets.TACHIBANA_SECOND_PASSWORD }}
  TACHIBANA_ENV: ${{ secrets.TACHIBANA_ENV }}

jobs:
  check-market-day:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.result.outputs.should_run }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate

      - name: Check market day and system active
        id: check
        run: |
          RESULT=$(npx tsx scripts/check-market-day.ts)
          echo "should_run=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Determine final result
        id: result
        run: |
          SKIP="${{ github.event.inputs.skip_market_day_check }}"
          CHECK="${{ steps.check.outputs.should_run }}"
          if [ "$SKIP" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=$CHECK" >> "$GITHUB_OUTPUT"
          fi

  news-collector:
    needs: check-market-day
    if: |
      needs.check-market-day.outputs.should_run == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'news')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Start yfinance sidecar
        uses: ./.github/actions/start-yfinance
      - run: npm run news

  market-assessment:
    needs: [check-market-day, news-collector]
    if: |
      always() &&
      needs.check-market-day.outputs.should_run == 'true' &&
      needs.news-collector.result != 'failure' &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'assess')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Start yfinance sidecar
        uses: ./.github/actions/start-yfinance
      - run: npm run assess

  holding-score:
    needs: [check-market-day, market-assessment]
    if: |
      always() &&
      needs.check-market-day.outputs.should_run == 'true' &&
      needs.market-assessment.result != 'failure' &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'holding')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Start yfinance sidecar
        uses: ./.github/actions/start-yfinance
      - run: npm run holding-score

  stock-scanner:
    needs: [check-market-day, market-assessment]
    if: |
      always() &&
      needs.check-market-day.outputs.should_run == 'true' &&
      needs.market-assessment.result != 'failure' &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'scan')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Start yfinance sidecar
        uses: ./.github/actions/start-yfinance
      - run: npm run stock-scan

  notify-success:
    needs: [news-collector, market-assessment, holding-score, stock-scanner]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on success
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Morning Analysis 完了"
          SLACK_MESSAGE: "ニュース収集・市場評価・保有スコアリング・銘柄スキャンが正常に完了しました"
          SLACK_COLOR: good
          SLACK_FOOTER: "Stock Buddy"

  notify-failure:
    needs: [news-collector, market-assessment, holding-score, stock-scanner]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Morning Analysis 失敗"
          SLACK_MESSAGE: |
            朝の分析ジョブが失敗しました。
            詳細はGitHub Actionsログを確認してください。
          SLACK_COLOR: danger
          SLACK_FOOTER: "Stock Buddy"
