name: "[cron-job.org] Morning Analysis"

on:
  # schedule:
  #   # 8:00 JST = 23:00 UTC (前日)
  #   # UTC日-木 = JST月-金
  #   - cron: "0 23 * * 0-4"
  workflow_dispatch:
    inputs:
      job:
        description: "実行するジョブ"
        type: choice
        required: true
        default: all
        options:
          - all
          - news
          - assess
          # - holding  # [DISABLED] breakout戦略に一本化のため無効化（2026-03-25）
          - watchlist
          - social
          # - scan  # [DISABLED] breakout戦略に一本化のため無効化（2026-03-25）
      skip_market_day_check:
        description: "休場日チェックをスキップ"
        type: boolean
        default: false

concurrency:
  group: morning-analysis
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  SNS_POST_SLACK_WEBHOOK_URL: ${{ secrets.SNS_POST_SLACK_WEBHOOK_URL }}
  TACHIBANA_AUTH_ID: ${{ secrets.TACHIBANA_AUTH_ID }}
  TACHIBANA_PRIVATE_KEY: ${{ secrets.TACHIBANA_PRIVATE_KEY }}
  TACHIBANA_SECOND_PASSWORD: ${{ secrets.TACHIBANA_SECOND_PASSWORD }}
  TACHIBANA_ENV: ${{ secrets.TACHIBANA_ENV }}
  YFINANCE_PROXY: ${{ secrets.YFINANCE_PROXY }}
  BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
  BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

jobs:
  check-market-day:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.result.outputs.should_run }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate

      - name: Check market day and system active
        id: check
        run: |
          RESULT=$(npx tsx scripts/check-market-day.ts)
          echo "should_run=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Determine final result
        id: result
        run: |
          SKIP="${{ github.event.inputs.skip_market_day_check }}"
          CHECK="${{ steps.check.outputs.should_run }}"
          if [ "$SKIP" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=$CHECK" >> "$GITHUB_OUTPUT"
          fi

  news-collect:
    needs: check-market-day
    if: |
      needs.check-market-day.outputs.should_run == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'news')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run news-collect

  market-assessment:
    needs: [check-market-day, news-collect]
    if: |
      always() &&
      needs.check-market-day.outputs.should_run == 'true' &&
      needs.news-collect.result != 'failure' &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'assess')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Start yfinance sidecar
        uses: ./.github/actions/start-yfinance
      - run: npm run assess

  # [DISABLED] breakout戦略に一本化のため無効化（2026-03-25）
  # holding-score:
  #   needs: [check-market-day, market-assessment]
  #   if: |
  #     always() &&
  #     needs.check-market-day.outputs.should_run == 'true' &&
  #     needs.market-assessment.result != 'failure' &&
  #     (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'holding')
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 10
  #   steps:
  #     - uses: actions/checkout@v5
  #     - uses: actions/setup-node@v5
  #       with:
  #         node-version-file: ".tool-versions"
  #         cache: "npm"
  #     - run: npm ci
  #     - run: npx prisma generate
  #     - name: Start yfinance sidecar
  #       uses: ./.github/actions/start-yfinance
  #     - run: npm run holding-score


  watchlist-builder:
    needs: [check-market-day, market-assessment]
    if: |
      always() &&
      needs.check-market-day.outputs.should_run == 'true' &&
      needs.market-assessment.result != 'failure' &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'watchlist')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run watchlist-build

  # [DISABLED] breakout戦略に一本化のため無効化（2026-03-25）
  # stock-scanner:
  #   needs: [check-market-day, market-assessment]
  #   if: |
  #     always() &&
  #     needs.check-market-day.outputs.should_run == 'true' &&
  #     needs.market-assessment.result != 'failure' &&
  #     (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'scan')
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 60
  #   steps:
  #     - uses: actions/checkout@v5
  #     - uses: actions/setup-node@v5
  #       with:
  #         node-version-file: ".tool-versions"
  #         cache: "npm"
  #     - run: npm ci
  #     - run: npx prisma generate
  #     - name: Start yfinance sidecar
  #       uses: ./.github/actions/start-yfinance
  #     - run: npm run stock-scan

  # 朝の相場局面 SNS 公開投稿（KOH-518 / KOH-521）
  # 当初は独立ワークフロー（GitHub Actions cron 7:45 JST）だったが初回スケジュールが
  # 発火せず、市場評価の完了に連動させる方が確実なため本ワークフローに統合した。
  # レジーム判定は前日終値ベース（DB由来）なので market-assessment の結果には依存しないが、
  # 「市場評価が出たら状態を投稿する」という朝の流れに合わせて assess 成功後に実行する。
  morning-social-post:
    needs: [check-market-day, market-assessment]
    if: |
      always() &&
      needs.check-market-day.outputs.should_run == 'true' &&
      needs.market-assessment.result != 'failure' &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'social')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Post morning regime to Bluesky
        run: npm run social:post-morning

  notify-failure:
    needs:
      [
        check-market-day,
        news-collect,
        market-assessment,
        watchlist-builder,
        morning-social-post,
      ]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Notify Slack with failure detail
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_ID: ${{ github.run_id }}
        run: python scripts/check_morning_analysis_status.py
