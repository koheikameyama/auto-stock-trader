name: Buyback Phase A Review

# 自社株買い Phase A（KOH-504 観察モード）の観察レビュー
# production BuybackSignal を SELECT し Slack 通知する。
#
# ⚠️ 2026-07-15 (KOH-556) に **週次スケジュールを停止**した。
# このレビューは「Phase B に進んでよいか」を判断するためのものだったが、Phase B 自体が却下された
# ため定期実行の意味が無くなった。却下理由: 却下 #39 でイントラバー先読みを直した現エンジンでは
# buyback が fullcycle Calmar を 73.2 → 59.7 (-18%) と悪化させ、live 再現定義でも 66.8 (-9%)。
# baseline を超える構成が1つも無い。`.claude/rules/backtest.md` 却下リスト #41 参照。
#
# 本番の buyback-monitor（毎営業日20:00 の観察ジョブ）も同時に停止済み（src/worker.ts）。
# 手動実行（workflow_dispatch）は過去の観察データを見るために残す。

on:
  # schedule:
  #   - cron: "0 0 * * 5"
  workflow_dispatch: {}

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install psycopg2-binary requests

      - name: Run Phase A review
        env:
          PROD_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/buyback_phase_a_review.py

      - name: Notify Slack on failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "❌ 自社株買い Phase A レビューに失敗しました"
          SLACK_MESSAGE: |
            観察レビューのワークフローがエラーで終了しました
            詳細はGitHub Actionsログを確認してください
          SLACK_COLOR: danger
          SLACK_FOOTER: "Auto Stock Trader"
