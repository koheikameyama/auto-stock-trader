name: "Start yfinance sidecar"
description: "Sets up Python, installs dependencies, and starts the yfinance FastAPI sidecar"

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11.6"
        cache: "pip"
        cache-dependency-path: "yfinance-service/requirements.txt"
    - name: Install dependencies
      shell: bash
      working-directory: yfinance-service
      run: pip install -r requirements.txt
    - name: Start sidecar
      shell: bash
      working-directory: yfinance-service
      run: |
        uvicorn main:app --port 8000 &
        # Wait for the server to start
        sleep 3
